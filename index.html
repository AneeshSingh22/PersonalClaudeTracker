<!DOCTYPE html>

<style>
/* ===== Design tokens — bold/flat, one signature accent ===== */
:root {
  --bg: #070707;
  --bg-panel: #151515;
  --bg-panel-hover: #1c1c1c;
  --line: rgba(255,255,255,0.10);
  --white: #FFFFFF;
  --text-secondary: #A6ABA1;
  --text-tertiary: #6E7369;
  --volt: #D7FF3D;
  --volt-dim: rgba(215,255,61,0.14);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-display: 'Anton', var(--font);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
/* Fine grain only — no color-blob glow. */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}

.page { max-width: 1100px; margin: 0 auto; }

/* ===== Header ===== */
.hub-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 22px; }
.hub-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px;
}
.hub-eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--volt); box-shadow: 0 0 8px rgba(215,255,61,0.7); }
.dash-title {
  margin: 0 0 6px; font-family: var(--font-display); font-weight: 400;
  font-size: 40px; line-height: 0.95; letter-spacing: 0.01em; text-transform: uppercase;
  color: var(--white);
}
.hub-sub { font-size: 13.5px; color: var(--text-secondary); font-weight: 500; }
.hub-head-right { display: flex; align-items: center; gap: 10px; padding-top: 4px; }
.gear-btn {
  width: 42px; height: 42px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 12px; border: 1px solid var(--line);
  background: var(--bg-panel); color: var(--text-secondary);
  cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.gear-btn:hover { background: var(--bg-panel-hover); color: var(--white); border-color: rgba(255,255,255,0.18); }
.gear-btn:active { transform: scale(0.94) rotate(35deg); }
.gear-btn svg { width: 22px; height: 22px; }
@media (max-width: 480px) { .dash-title { font-size: 30px; } }

/* ===== Hero stat panel ===== */
.hero-stat {
  position: relative; overflow: hidden;
  background: var(--bg-panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 24px 24px 22px;
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
}
.hero-stat-left { min-width: 0; }
.hero-stat-eyebrow {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary);
  margin-bottom: 6px;
}
.hero-stat-num-row { display: flex; align-items: baseline; gap: 10px; }
.hero-stat-num {
  font-family: var(--font-display); font-weight: 400; color: var(--volt);
  font-size: 64px; line-height: 0.9; letter-spacing: 0.01em;
  font-variant-numeric: tabular-nums;
}
.hero-stat-of { font-family: var(--font-display); font-size: 28px; color: var(--text-tertiary); }
.hero-stat-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.hero-stat-bar-wrap { width: 100%; max-width: 240px; }
.hero-stat-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; margin-bottom: 8px; }
.hero-stat-bar-fill { height: 100%; width: 0%; background: var(--volt); border-radius: 999px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); box-shadow: 0 0 12px rgba(215,255,61,0.5); }
.hero-stat-cta {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--volt);
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.hero-stat-cta svg { width: 13px; height: 13px; }
@media (max-width: 480px) { .hero-stat-num { font-size: 52px; } }

/* ===== BENTO GRID — flat, no blur, one accent ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 156px;
  grid-auto-flow: dense;
  gap: 10px;
}
.tile {
  --cat: var(--volt);                /* each tile overrides this with its own bold color */
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 21px 18px 16px;
  border-radius: 14px;
  text-decoration: none;
  background: var(--bg-panel);
  border: 1px solid var(--line);
  transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
}
/* Solid color tab — a flat block, not a glow. */
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--cat);
}
.tile:hover { background: var(--bg-panel-hover); border-color: color-mix(in srgb, var(--cat) 55%, var(--line)); }
.tile:active { transform: scale(0.985); }

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

.tile-icon {
  width: 34px; height: 34px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--cat);
}
.tile.big .tile-icon { width: 40px; height: 40px; }
.tile-icon svg { width: 24px; height: 24px; }
.tile.big .tile-icon svg { width: 28px; height: 28px; }
.tile-spacer { flex: 1; }
.tile-title {
  font-family: var(--font-display); font-weight: 400; text-transform: uppercase;
  font-size: 19px; letter-spacing: 0.01em;
  color: var(--white); margin: 0 0 2px;
}
.tile.big .tile-title { font-size: 25px; }
.tile-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.tile-sub { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
.tile-arrow {
  display: inline-flex; color: var(--volt);
  transition: transform 0.18s ease; flex-shrink: 0;
}
.tile-arrow svg { width: 15px; height: 15px; }
.tile:hover .tile-arrow { transform: translateX(4px); }

@media (max-width: 720px) {
  .bento { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 144px; }
  .tile.big { grid-column: span 2; grid-row: span 1; }
  .tile.big .tile-title { font-size: 21px; }
}
@media (max-width: 440px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .bento { grid-template-columns: 1fr; grid-auto-rows: 128px; }
  .tile.big, .tile.wide { grid-column: span 1; }
}

/* ===== Settings modal ===== */
.modal-bg {
  position: fixed; inset: 0; z-index: 120; display: none;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(0,0,0,0.7);
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto;
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 16px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-family: var(--font-display); font-size: 20px; text-transform: uppercase; color: var(--white); }
.modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; }
.modal-close:hover { color: var(--white); }
.field { margin-bottom: 14px; }
.field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 7px; display: block; }
.field-row { display: flex; gap: 8px; align-items: center; }
.set-input {
  flex: 1; min-width: 0; padding: 11px 13px;
  border: 1px solid var(--line); border-radius: 10px;
  background: var(--bg); color: var(--white);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.set-input:focus { border-color: var(--volt); }
.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.seg button { border: 0; background: transparent; color: var(--text-tertiary); font-family: inherit; font-size: 13px; font-weight: 600; padding: 11px 14px; cursor: pointer; transition: background 0.15s, color 0.15s; }
.seg button.on { background: var(--volt); color: #0A0A0B; }
.set-save {
  width: 100%; margin-top: 6px; padding: 13px; border: 0; border-radius: 10px;
  background: var(--volt); color: #0A0A0B;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  transition: filter 0.15s, transform 0.1s;
}
.set-save:hover { filter: brightness(1.08); }
.set-save:active { transform: translateY(1px); }
.set-status { text-align: center; font-size: 12px; color: var(--volt); min-height: 16px; margin-top: 8px; }
</style>
</head>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const WATER_KEY = 'po_water_v1';

  function loadJSON(k, f) { try { return JSON.parse(localStorage.getItem(k)) || f; } catch (e) { return f; } }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  // Mirror of topbar.js defaultWaterState so we never clobber the water tracker.
  function defaultWater() {
    return { unit:'bottle', bottleMl:500, glassMl:250, weightUnit:'kg',
      profile:{ weightKg:75, age:25, sex:'m', activityHrsPerWeek:5 },
      caffeineMgPerDay:200, substances:[], logs:{} };
  }

  /* ---------- unit state ---------- */
  let heightUnit = 'cm';   // 'cm' | 'ft'
  let weightUnit = 'kg';   // 'kg' | 'lb'
  let sex = 'm';

  function setHeightUnit(u) {
    heightUnit = u;
    $('heightUnitSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.u === u));
    const a = $('heightA'), b = $('heightB');
    if (u === 'cm') { a.placeholder = 'cm'; b.style.display = 'none'; }
    else { a.placeholder = 'ft'; b.placeholder = 'in'; b.style.display = ''; }
  }
  function setWeightUnit(u) {
    weightUnit = u;
    $('weightUnitSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.u === u));
  }
  function setSex(s) {
    sex = s;
    $('sexSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.s === s));
  }

  function getHeightCm() {
    if (heightUnit === 'cm') { const v = parseFloat($('heightA').value); return v > 0 ? v : null; }
    const ft = parseFloat($('heightA').value) || 0;
    const inch = parseFloat($('heightB').value) || 0;
    const cm = ft * 30.48 + inch * 2.54;
    return cm > 0 ? Math.round(cm) : null;
  }
  function fillHeight(cm) {
    if (!cm) { $('heightA').value = ''; $('heightB').value = ''; return; }
    if (heightUnit === 'cm') { $('heightA').value = Math.round(cm); }
    else { const totalIn = cm / 2.54; $('heightA').value = Math.floor(totalIn / 12); $('heightB').value = Math.round(totalIn % 12); }
  }

  /* ---------- load existing profile into the form ---------- */
  function populate() {
    const w = loadJSON(WATER_KEY, defaultWater());
    const p = w.profile || {};
    setWeightUnit(w.weightUnit === 'lb' ? 'lb' : 'kg');
    setHeightUnit(p.heightUnit === 'ft' ? 'ft' : 'cm');
    setSex(p.sex === 'f' ? 'f' : 'm');
    fillHeight(p.heightCm || null);
    if (p.weightKg) $('weight').value = weightUnit === 'lb' ? Math.round(p.weightKg * 2.20462) : Math.round(p.weightKg);
    else $('weight').value = '';
    $('age').value = p.age || '';
    $('activity').value = (p.activityHrsPerWeek != null ? p.activityHrsPerWeek : '');
  }

  /* ---------- save back into po_water_v1 (merge, never overwrite logs) ---------- */
  function save() {
    const w = loadJSON(WATER_KEY, defaultWater());
    w.profile = w.profile || {};
    const cm = getHeightCm();
    if (cm) { w.profile.heightCm = cm; w.profile.heightUnit = heightUnit; }
    const wv = parseFloat($('weight').value);
    if (wv > 0) { w.profile.weightKg = weightUnit === 'lb' ? +(wv / 2.20462).toFixed(1) : wv; w.weightUnit = weightUnit; }
    const age = parseInt($('age').value, 10); if (age > 0) w.profile.age = age;
    w.profile.sex = sex;
    const act = parseFloat($('activity').value); if (act >= 0 && !isNaN(act)) w.profile.activityHrsPerWeek = act;
    saveJSON(WATER_KEY, w);
    const s = $('settingsStatus'); s.textContent = 'Saved ✓';
    setTimeout(() => { s.textContent = ''; }, 1800);
  }

  /* ---------- open / close ---------- */
  function open() { populate(); $('settingsBg').classList.add('show'); }
  if (location.hash === '#settings') open();
  function close() { $('settingsBg').classList.remove('show'); }
  $('settingsOpen').addEventListener('click', open);
  $('settingsClose').addEventListener('click', close);
  $('settingsBg').addEventListener('click', (e) => { if (e.target === $('settingsBg')) close(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
  $('settingsSave').addEventListener('click', save);
  $('heightUnitSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    const cm = getHeightCm(); setHeightUnit(b.dataset.u); fillHeight(cm);
  }));
  $('weightUnitSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    const v = parseFloat($('weight').value);
    const kg = v > 0 ? (weightUnit === 'lb' ? v / 2.20462 : v) : null;
    setWeightUnit(b.dataset.u);
    if (kg) $('weight').value = weightUnit === 'lb' ? Math.round(kg * 2.20462) : Math.round(kg);
  }));
  $('sexSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => setSex(b.dataset.s)));

  /* ---------- Header greeting/date ---------- */
  function renderGreeting() {
    const now = new Date();
    const h = now.getHours();
    const greeting = h < 5 ? 'Late night' : h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : h < 22 ? 'Good evening' : 'Late night';
    const weekday = now.toLocaleDateString(undefined, { weekday: 'long' });
    const date = now.toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
    $('hubEyebrow').textContent = weekday.toUpperCase() + ' · ' + date;
    $('hubSub').textContent = greeting + ', Aneesh.';
  }
  renderGreeting();

  /* ---------- Hero stat: real goals data, same date key logic as main.html ---------- */
  function pad2(n) { return String(n).padStart(2, '0'); }
  function activeDateKey() {
    const now = new Date();
    if (now.getHours() < 6) now.setDate(now.getDate() - 1);
    return 'goals:' + now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-' + pad2(now.getDate());
  }
  function renderHeroStat() {
    const goals = loadJSON(activeDateKey(), []);
    const list = Array.isArray(goals) ? goals : [];
    const total = list.length;
    const done = list.filter(g => g && g.done).length;
    $('heroNum').textContent = done;
    $('heroOf').textContent = '/ ' + total;
    $('heroBar').style.width = total > 0 ? Math.round((done / total) * 100) + '%' : '0%';
    $('heroLabel').textContent = total === 0 ? 'No goals set yet' : (done === total ? 'All done — solid day' : 'goals done today');
  }
  renderHeroStat();
})();
</script>
</body>
</html>
