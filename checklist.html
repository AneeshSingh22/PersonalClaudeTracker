<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070707">
<title>Aneesh's Dashboard</title>
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
body { padding: max(28px, env(safe-area-inset-top)) 20px 60px; }

.cl-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px;
}
.cl-eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--volt); box-shadow: 0 0 8px rgba(215,255,61,0.7); }
.cl-sub { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 22px; }

/* Hero progress card — same language as the hub's "Today" panel */
.cl-hero {
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 16px;
  padding: 22px 22px 20px; margin-bottom: 24px;
}
.cl-hero-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.cl-hero-num-row { display: flex; align-items: baseline; gap: 8px; }
.cl-hero-num { font-family: var(--font-display); font-weight: 400; color: var(--volt); font-size: 44px; line-height: 0.9; font-variant-numeric: tabular-nums; }
.cl-hero-of { font-family: var(--font-display); font-size: 20px; color: var(--text-tertiary); }
.cl-hero-label { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-top: 4px; }
.cl-hero-bar-wrap { width: 100%; max-width: 220px; }
.cl-hero-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
.cl-hero-bar-fill { height: 100%; width: 0%; background: var(--volt); border-radius: 999px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1); box-shadow: 0 0 12px rgba(215,255,61,0.5); }

.cl-section-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary);
  margin: 0 0 10px;
}
.cl-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
.cl-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 12px;
  text-decoration: none; cursor: pointer;
  transition: background 0.16s ease, border-color 0.16s ease;
}
.cl-row:hover { background: var(--bg-panel-hover); }
.cl-row.done { border-color: color-mix(in srgb, var(--success) 45%, var(--line)); }
.cl-check {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--line); background: var(--bg-panel-hover);
  display: flex; align-items: center; justify-content: center;
  color: transparent; font-size: 14px; font-weight: 800;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.cl-row.done .cl-check { background: var(--success); border-color: var(--success); color: #0A0A0B; }
.cl-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.cl-name { font-size: 14.5px; font-weight: 700; color: var(--text-primary); }
.cl-row.done .cl-name { color: var(--text-secondary); }
.cl-meta { font-size: 11.5px; color: var(--text-tertiary); }
.cl-arrow { color: var(--text-tertiary); flex-shrink: 0; }
.cl-arrow svg { width: 14px; height: 14px; }
.cl-row:hover .cl-arrow { color: var(--volt); }
</style>
</head>
<body>
<div class="page">

  <div class="cl-eyebrow"><span class="cl-eyebrow-dot"></span><span id="clEyebrow">—</span></div>
  <h1 class="dash-title">Checklist</h1>
  <div class="cl-sub">Everything the app tracks, in one place — tap an item to go do it.</div>

  <div class="cl-hero">
    <div class="cl-hero-row">
      <div>
        <div class="cl-hero-num-row">
          <span class="cl-hero-num" id="clDailyNum">0</span>
          <span class="cl-hero-of" id="clDailyOf">/ 0</span>
        </div>
        <div class="cl-hero-label">done today</div>
      </div>
      <div class="cl-hero-bar-wrap">
        <div class="cl-hero-bar"><div class="cl-hero-bar-fill" id="clDailyBar"></div></div>
      </div>
    </div>
  </div>

  <div class="cl-section-title">Daily</div>
  <div class="cl-list" id="clDailyList"></div>

  <div class="cl-section-title">Setup &amp; check-ins</div>
  <div class="cl-list" id="clSetupList"></div>

</div>

<script>
(function () {
  'use strict';
  function storeGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch (e) { return null; } }

  function pad2(n) { return String(n).padStart(2, '0'); }
  function activeDateKey() {
    const now = new Date();
    if (now.getHours() < 6) now.setDate(now.getDate() - 1);
    return now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-' + pad2(now.getDate());
  }
  function calendarDateKey(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function todayMidnight() {
    const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime();
  }
  function daysAgo(dateKeyOrIso) {
    if (!dateKeyOrIso) return Infinity;
    const t = new Date(dateKeyOrIso).getTime();
    if (isNaN(t)) return Infinity;
    return Math.floor((Date.now() - t) / 86400000);
  }
  function fmtDaysAgo(n) {
    if (n === Infinity) return 'never';
    if (n <= 0) return 'today';
    if (n === 1) return '1 day ago';
    return n + ' days ago';
  }

  // ---------- Daily item checks ----------
  function checkGoals() {
    const goals = storeGet('goals:' + activeDateKey()) || [];
    const total = Array.isArray(goals) ? goals.length : 0;
    const done = total ? goals.filter((g) => g && g.done).length : 0;
    return { done: total > 0 && done >= total, sub: total ? (done + '/' + total + ' done') : 'No goals set yet' };
  }
  function checkStack() {
    const items = storeGet('stack:items') || [];
    const taken = storeGet('stack:taken:' + activeDateKey()) || {};
    const total = Array.isArray(items) ? items.length : 0;
    const done = total ? items.filter((i) => i && taken[i.id]).length : 0;
    return { done: total > 0 && done >= total, sub: total ? (done + '/' + total + ' taken') : 'Nothing in your stack yet' };
  }
  function checkWater() {
    const state = storeGet('po_water_v1');
    if (!state) return { done: false, sub: 'Not set up yet' };
    const todayKey = calendarDateKey();
    const done = (state.logs || {})[todayKey] || 0;
    const p = state.profile || { weightKg: 75 };
    const wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
    const base = wKg * 35;
    const exercise = (p.activityHrsPerWeek || 0) / 7 * 500;
    const caffeine = Math.max(0, (state.caffeineMgPerDay || 0) - 200) * 1.5;
    const subs = (state.substances || []).reduce((s, x) => {
      const dose = (x && x.dose != null ? x.dose : (x && x.defaultDose)) || 0;
      return s + Math.max(0, dose * ((x && x.mlPerUnit) || 0));
    }, 0);
    let adjust = 0;
    if (p.sex === 'm') adjust += 200;
    if ((p.age || 0) >= 50) adjust += 100;
    const totalMl = base + exercise + caffeine + subs + adjust;
    let unitVol;
    if (state.unit === 'glass') unitVol = state.glassMl || 250;
    else if (state.unit === 'oz') unitVol = 30;
    else if (state.unit === 'ml') unitVol = 1;
    else unitVol = state.bottleMl || 500;
    const total = Math.max(1, Math.ceil(totalMl / unitVol));
    return { done: done >= total, sub: done + '/' + total + ' today' };
  }
  function checkWorkout() {
    const state = storeGet('po_coach_v1');
    const logs = (state && state.logs) || {};
    const today = calendarDateKey();
    let loggedToday = false;
    Object.keys(logs).forEach((exId) => {
      (logs[exId] || []).forEach((set) => {
        if (set && String(set.date || '').slice(0, 10) === today) loggedToday = true;
      });
    });
    return { done: loggedToday, sub: loggedToday ? 'Logged today' : 'Not logged yet' };
  }
  function checkCaffeine() {
    const logs = storeGet('caf:logs') || [];
    const mid = todayMidnight();
    const loggedToday = Array.isArray(logs) && logs.some((l) => l && l.ts >= mid);
    return { done: loggedToday, sub: loggedToday ? 'Logged today' : 'Not logged yet' };
  }

  // ---------- Setup / check-in item checks ----------
  function checkWeight() {
    const entries = storeGet('po_coach_weights') || [];
    if (!Array.isArray(entries) || !entries.length) return { done: false, sub: 'Never logged' };
    const latest = entries.reduce((a, b) => (a && a.dateKey > b.dateKey ? a : b));
    const age = daysAgo(latest.dateKey);
    return { done: age <= 7, sub: 'Updated ' + fmtDaysAgo(age) };
  }
  function checkHeight() {
    const w = storeGet('po_water_v1');
    const cm = w && w.profile && w.profile.heightCm;
    return { done: !!cm, sub: cm ? cm + ' cm' : 'Not set' };
  }
  function checkSubs() {
    const subs = storeGet('subs') || [];
    const n = Array.isArray(subs) ? subs.length : 0;
    return { done: n > 0, sub: n ? n + ' tracked' : 'None added yet' };
  }
  // Income has no per-entry dates of its own, so "last touched" is read from
  // finance.html's own activity log (every nw: add/edit/delete already stamps one).
  function checkIncome() {
    const income = storeGet('nw:income') || [];
    if (!Array.isArray(income) || !income.length) return { done: false, sub: 'None added yet' };
    const activity = storeGet('nw:activity') || [];
    const lastTs = activity.filter((a) => a && a.cat === 'income').reduce((max, a) => Math.max(max, a.ts || 0), 0);
    const age = lastTs ? daysAgo(lastTs) : Infinity;
    return { done: age <= 7, sub: lastTs ? 'Updated ' + fmtDaysAgo(age) : income.length + ' tracked' };
  }

  const DAILY = [
    { key: 'goals', name: "Today's goals", href: 'main.html', icon: 'M9 11l3 3L22 4', check: checkGoals },
    { key: 'stack', name: 'Daily stack', href: 'health.html#stack', icon: 'M12 8v8M8 12h8', check: checkStack },
    { key: 'water', name: 'Log water', href: 'health.html#water', icon: 'M12 2.7s6.2 6.9 6.2 11a6.2 6.2 0 1 1-12.4 0c0-4.1 6.2-11 6.2-11z', check: checkWater },
    { key: 'workout', name: 'Log a workout', href: 'gym.html', icon: 'M5 12h14M7 8v8M17 8v8', check: checkWorkout },
    { key: 'caffeine', name: 'Log caffeine', href: 'caffeine.html', icon: 'M5 9h12a1 1 0 0 1 1 1v2.2a4.3 4.3 0 0 1-4.3 4.3H9.3A4.3 4.3 0 0 1 5 12.2V9z', check: checkCaffeine },
  ];
  const SETUP = [
    { key: 'weight', name: 'Update your weight', href: 'gym.html#weight-section', check: checkWeight },
    { key: 'income', name: 'Update your income', href: 'finance.html', check: checkIncome },
    { key: 'height', name: 'Set your height', href: 'index.html#settings', check: checkHeight },
    { key: 'subs', name: 'Track your subscriptions', href: 'finance.html', click: goToSubs, check: checkSubs },
  ];

  function goToSubs(e) {
    e.preventDefault();
    try { localStorage.setItem('finance_active_tab', 'subs'); } catch (err) {}
    window.location.href = 'finance.html';
  }

  function renderList(items, containerId) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    items.forEach((item) => {
      const result = item.check();
      const row = document.createElement('a');
      row.href = item.href;
      row.className = 'cl-row' + (result.done ? ' done' : '');
      if (item.click) row.addEventListener('click', item.click);
      row.innerHTML =
        '<span class="cl-check">✓</span>' +
        '<span class="cl-body"><span class="cl-name">' + item.name + '</span><span class="cl-meta">' + result.sub + '</span></span>' +
        '<span class="cl-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>';
      el.appendChild(row);
      item._done = result.done;
    });
  }

  function render() {
    renderList(DAILY, 'clDailyList');
    renderList(SETUP, 'clSetupList');
    const doneCount = DAILY.filter((i) => i._done).length;
    document.getElementById('clDailyNum').textContent = doneCount;
    document.getElementById('clDailyOf').textContent = '/ ' + DAILY.length;
    document.getElementById('clDailyBar').style.width = Math.round((doneCount / DAILY.length) * 100) + '%';

    const now = new Date();
    document.getElementById('clEyebrow').textContent =
      now.toLocaleDateString(undefined, { weekday: 'long' }).toUpperCase() + ' · ' +
      now.toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
  }

  render();
  window.addEventListener('focus', render);
  window.addEventListener('storage', render);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
})();
</script>
</body>
</html>
