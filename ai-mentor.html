<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Mentor</title>
<!-- ============================================================
 * AI MENTOR — the dashboard's dedicated chat + memory tab.
 * Single self-contained file. No backend, no build step.
 *
 * Default brain: WebLLM, a small open-source model that runs
 * entirely in this browser via WebGPU. No signup, no API key,
 * completely free — the model downloads once and is cached after.
 *
 * Swappable: flip to Anthropic any time by pasting a key below.
 * Same chat history, same context, same UI either way.
 *
 * This tab keeps the running conversation in localStorage, so it
 * persists across visits — the contextual mentor bubble on other
 * pages is for quick in-the-moment questions and doesn't keep history.
 * ============================================================ -->
<script src="ai-mentor.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #8B5CF6; --accent-2: #C9B8FF; --bg: #070707; --fg: #e9ecf5; --muted: rgba(233,236,245,.55); --line: rgba(255,255,255,.1); --panel: #111016; }
html, body { background: var(--bg); }
body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 22px 18px 60px; }
.back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 13px; margin-bottom: 16px; }
.back:hover { color: var(--fg); }

.top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.orb { width: 54px; height: 54px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 50% 58%, #8A6CFF, #4C2EC9 80%);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.14), 0 6px 22px rgba(124,92,255,0.5), inset 0 -6px 14px rgba(38,10,86,0.65);
  animation: orbFloat 4s ease-in-out infinite; }
.orb::before { content: ''; position: absolute; inset: -28%; border-radius: 50%;
  background: conic-gradient(from 0deg, #6D4AE0, #C9B8FF, #7C5CFF, #B98AFF, #8A6CFF, #6D4AE0);
  filter: blur(2px); opacity: 0.92; animation: orbspin 7s linear infinite; }
.orb::after { content: ''; position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle at 34% 26%, rgba(255,255,255,0.92), rgba(255,255,255,0) 40%),
              radial-gradient(circle at 72% 82%, rgba(18,7,40,0.5), transparent 55%); }
.orb.think { animation: orbFloat 1.1s ease-in-out infinite, orbPulse 1.1s ease-in-out infinite; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
@keyframes orbspin { to { transform: rotate(360deg); } }
@keyframes orbPulse { 0%,100% { box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 6px 22px rgba(124,92,255,.5) } 50% { box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 6px 34px 4px rgba(124,92,255,.8) } }

.title h1 { font-size: 24px; font-weight: 800; letter-spacing: -.01em; }
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
.hdr-actions { margin-left: auto; display: flex; gap: 8px; }
.icon-btn { border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; opacity: .7; transition: opacity .15s; }
.icon-btn:hover { opacity: 1; }

/* ---- provider settings panel ---- */
.settings { display: none; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.settings.open { display: block; }
.settings h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
.provider-row { display: flex; gap: 8px; margin-bottom: 12px; }
.provider-btn { flex: 1; border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--fg); border-radius: 10px; padding: 10px; font-size: 12.5px; font-weight: 600; cursor: pointer; text-align: center; }
.provider-btn.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 18%, transparent); }
.provider-btn small { display: block; font-weight: 400; color: var(--muted); margin-top: 2px; font-size: 10.5px; }
.keybar { display: none; gap: 8px; }
.keybar.open { display: flex; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 10px 12px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 14px; cursor: pointer; color: #14081f; background: var(--accent-2); font-weight: 600; font-size: 13px; }
.hint { font-size: 11.5px; color: var(--muted); line-height: 1.5; margin-top: 10px; }
.hint.saved { color: var(--accent-2); }
.gpu-warn { font-size: 11.5px; color: #fbbf24; line-height: 1.5; margin-top: 10px; }

/* ---- chat ---- */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; min-height: 40vh; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #14081f; background: var(--accent-2); padding: 3px 9px; border-radius: 999px; }
.bubble b { color: var(--accent-2); font-weight: 700; }
.bubble code { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 5px; }
.bubble ul { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.bubble li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-2); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer { display: flex; gap: 9px; position: sticky; bottom: 12px; }
.composer input { flex: 1; background: rgba(20,20,22,.9); backdrop-filter: blur(6px); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; border: 0; border-radius: 12px; cursor: pointer; color: #14081f; background: var(--accent-2); font-size: 18px; }
.composer button:active { transform: scale(.94); }
.clear-row { text-align: center; margin-top: 4px; }
.clear-row button { border: 0; background: transparent; color: var(--muted); font-size: 11.5px; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← Dashboard</a>
    <div class="top">
      <div class="orb" id="orb"></div>
      <div class="title"><h1>AI Mentor</h1><div class="role" id="providerLabel">free local model</div></div>
      <div class="hdr-actions">
        <button id="settingsToggle" class="icon-btn" aria-label="Settings" title="Provider settings">⚙</button>
      </div>
    </div>

    <div class="settings" id="settings">
      <h3>Brain</h3>
      <div class="provider-row">
        <button class="provider-btn" id="btnWebllm" type="button">Free local AI<small>runs in your browser, no key</small></button>
        <button class="provider-btn" id="btnAnthropic" type="button">Anthropic<small>your own API key</small></button>
      </div>
      <div class="keybar" id="keybar">
        <input id="keyInput" type="password" placeholder="paste your Anthropic API key (sk-ant-…)" autocomplete="off" />
        <button id="keySave">Save</button>
      </div>
      <div class="hint" id="hint">
        The free model downloads once (a few hundred MB) and runs fully on-device after that — nothing is sent anywhere.
        Needs a WebGPU browser (Chrome/Edge work well).
      </div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <input id="chatInput" placeholder="Ask your AI mentor anything…" autocomplete="off" />
      <button id="send" aria-label="Send">→</button>
    </div>
    <div class="clear-row"><button id="clearBtn" type="button">Clear conversation</button></div>
  </div>

<script>
(function(){
  const HISTORY_LS = 'ai_mentor_history_v1';
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const settings = document.getElementById('settings');
  const settingsToggle = document.getElementById('settingsToggle');
  const btnWebllm = document.getElementById('btnWebllm');
  const btnAnthropic = document.getElementById('btnAnthropic');
  const keybar = document.getElementById('keybar');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const providerLabel = document.getElementById('providerLabel');

  settingsToggle.addEventListener('click', () => settings.classList.toggle('open'));

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function setOrb(s){ orb.className = 'orb' + (s ? ' ' + s : ''); }

  // ---- provider UI ----
  function refreshProviderUI(){
    const p = window.AIMentor.getProvider();
    btnWebllm.classList.toggle('active', p === 'webllm');
    btnAnthropic.classList.toggle('active', p === 'anthropic');
    keybar.classList.toggle('open', p === 'anthropic');
    providerLabel.textContent = p === 'anthropic' ? 'anthropic (your key)' : 'free local model';
    if (p === 'anthropic' && window.AIMentor.getAnthropicKey()){
      hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Calls go straight to Anthropic.';
      keyInput.placeholder = '•••• key saved ••••';
    } else if (p === 'anthropic') {
      hint.classList.remove('saved'); hint.innerHTML = 'Your key is stored only in this browser and sent straight to Anthropic — never to us. Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style="color:var(--accent-2)">console.anthropic.com</a>.';
    } else {
      hint.classList.remove('saved');
      hint.innerHTML = 'The free model downloads once (a few hundred MB) and runs fully on-device after that — nothing is sent anywhere. Needs a WebGPU browser (Chrome/Edge work well).' +
        (window.AIMentor.hasWebGPU() ? '' : '<br><span style="color:#fbbf24">This browser doesn\'t support WebGPU — switch to Anthropic, or open this page in Chrome/Edge.</span>');
    }
  }
  btnWebllm.addEventListener('click', () => { window.AIMentor.setProvider('webllm'); refreshProviderUI(); });
  btnAnthropic.addEventListener('click', () => { window.AIMentor.setProvider('anthropic'); refreshProviderUI(); });
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    window.AIMentor.setAnthropicKey(k);
    keyInput.value = '';
    refreshProviderUI();
    settings.classList.remove('open');
  });
  refreshProviderUI();

  // ---- persistent history ----
  function loadHistory(){ try { return JSON.parse(localStorage.getItem(HISTORY_LS)) || []; } catch(e){ return []; } }
  function saveHistory(h){ try { localStorage.setItem(HISTORY_LS, JSON.stringify(h.slice(-60))); } catch(e){} }
  let history = loadHistory();

  // ---- read whatever the dashboard stored (for context) ----
  function sanitize(v, depth){
    if (depth>6) return null;
    if (typeof v==='string') return v.length>180 ? '[omitted]' : v;
    if (Array.isArray(v)) return v.slice(-60).map(x=>sanitize(x,depth+1));
    if (v && typeof v==='object'){ const o={}; for(const k in v){ if(/img|photo|image|data|base64|url|thumb|key/i.test(k)) continue; o[k]=sanitize(v[k],depth+1); } return o; }
    return v;
  }
  function dashboardData(){
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k === HISTORY_LS || /ai_mentor/i.test(k)) continue;
      try { out[k] = sanitize(JSON.parse(localStorage.getItem(k)), 0); } catch(e){ out[k] = localStorage.getItem(k); }
    }
    return out;
  }

  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul>' + items.join('') + '</ul>';
    return html;
  }
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/`(.+?)`/g, '<code>$1</code>'); }
  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); return e; }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">AI Mentor</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  // replay saved history on load
  history.forEach(m => {
    if (m.role === 'user') addUser(m.content);
    else addCoach(render(m.content));
  });

  const SYS = "You are the user's AI Mentor, the dedicated home for their ongoing conversation inside their personal life-tracking dashboard. " +
    "You can see everything they've saved (food, water, gym, finance, sleep, goals, etc.) and the recent chat history. " +
    "Give honest, specific, encouraging guidance grounded in their actual data. " +
    "Answer in short bullet points starting with '- ', few words each, plain language. " +
    "Wrap key words and numbers in **double asterisks**. " +
    "End with one '- Do today:' bullet giving the single best next action, unless the question doesn't call for one. " +
    "Dashboard data as JSON:\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    busy = true; addUser(text); input.value = '';
    history.push({ role: 'user', content: text }); saveHistory(history);
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    let system = SYS;
    try { system += JSON.stringify(dashboardData()); } catch(e){}
    try {
      const reply = await window.AIMentor.chat({
        system: system,
        messages: history.slice(-10).map(m => ({ role: m.role, content: m.content })),
        onProgress: (p) => { loading.innerHTML = render((p && p.text) || 'Loading free local model…'); },
        onToken: (delta, full) => { loading.innerHTML = render(full || '…'); scroll(); },
      });
      loading.innerHTML = render(reply || 'Hmm, no reply.');
      history.push({ role: 'assistant', content: reply || '' }); saveHistory(history);
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
    } catch(e){
      loading.innerHTML = render('- ' + (e && e.message ? e.message : 'Something went wrong.'));
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Clear this conversation?')) return;
    history = []; saveHistory(history); feed.innerHTML = '';
    addCoach(render(GREETING));
  });

  const GREETING = "Hey — I'm your **AI Mentor**. I can see everything across your dashboard — water, workouts, finances, health. Ask me anything, or tap **⚙** to switch brains. Right now I'm running as a **free local model** right in your browser.";
  if (!history.length) addCoach(render(GREETING));
})();
</script>
</body>
</html>
